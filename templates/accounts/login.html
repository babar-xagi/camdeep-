{% extends 'base.html' %}

{% block title %}Login - CAMDEEP{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="max-w-md w-full bg-white rounded-lg shadow-md p-8">
        <h1 class="text-3xl font-bold text-center mb-2 text-primary">CAMDEEP</h1>
        <h2 class="text-2xl font-bold text-center mb-8">Login</h2>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">
                    Username
                </label>
                <input type="text" name="username" id="id_username" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>

            <div>
                <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">
                    Password
                </label>
                <input type="password" name="password" id="id_password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>

            <button type="submit" class="w-full px-4 py-2 bg-primary text-white font-semibold rounded-lg hover:bg-blue-600 transition">
                Login
            </button>
        </form>

        <hr class="my-6">

        <p class="text-center text-gray-600 text-sm">
            Don't have an account?
            <a href="{% url 'accounts:register' %}" class="text-primary hover:underline">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
